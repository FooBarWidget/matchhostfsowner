name: Test

on:
  push:
    branches: [ "**" ]
    paths-ignore:
      - '*.md'
      - '*.png'
      - '*.jpg'
  pull_request:
    branches: [ "main" ]
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    # Trigger only on push (internal branches) or on PRs from forks.
    # Avoids duplicate runs on PRs from internal branches.
    if: >
      (github.event_name != 'pull_request' && github.event_name != 'pull_request_target')
      || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
    - name: Build
      run: cargo build --verbose
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: Dockerfile.integration-test-base
        tags: matchhostfsowner-integration-test-base
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
    - name: Run tests
      run: cargo test --verbose
