name: "CodeQL"

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
    types:
      - opened
      - reopened
      - synchronize
  schedule:
    - cron: '16 12 * * 5'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners (GitHub.com only)
    # Consider using larger runners or machines with greater resources for possible analysis time improvements.
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    # Trigger only on push (internal branches) or on PRs from forks.
    # Avoids duplicate runs on PRs from internal branches.
    if: >
      (github.event_name != 'pull_request' && github.event_name != 'pull_request_target')
      || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: rust
          build-mode: none
        # CodeQL supports the following values keywords for 'language': 'actions', 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'rust', 'swift'
        # Use `c-cpp` to analyze code written in C, C++ or both
        # Use 'java-kotlin' to analyze code written in Java, Kotlin or both
        # Use 'javascript-typescript' to analyze code written in JavaScript, TypeScript or both
        # To learn more about changing the languages that are analyzed or customizing the build mode for your analysis,
        # see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning.
        # If you are analyzing a compiled language, you can modify the 'build-mode' for that language to customize how
        # your codebase is analyzed, see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # Add any setup steps before running the `github/codeql-action/init` action.
    # This includes steps like installing compilers or runtimes (`actions/setup-node`
    # or others). This is typically only required for manual builds.
    # - name: Setup runtime (example)
    #   uses: actions/setup-example@v1

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        dependency-caching: true
        config-file: ./.github/codeql/codeql-config.yml
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.

        # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        # queries: security-extended,security-and-quality

    - name: Perform CodeQL Analysis
      id: analyze
      uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      with:
        category: "/language:${{matrix.language}}"
        post-processed-sarif-path: ../results-postprocessed
        upload: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' && 'never' || 'always' }}

    - name: Report CodeQL findings
      run: python3 - <<<"$SOURCE"
      env:
        SARIF_DIR: ../results-postprocessed
        SOURCE: |
          import glob
          import json
          import os
          import sys

          sarif_dir = os.environ["SARIF_DIR"]
          findings = []
          failing_findings = []

          for path in sorted(glob.glob(os.path.join(sarif_dir, "*.sarif"))):
              with open(path, encoding="utf-8") as handle:
                  data = json.load(handle)

              for run in data.get("runs", []):
                  for result in run.get("results", []):
                      message = result.get("message", {}).get("text") or "CodeQL finding"
                      level = result.get("level", "warning")
                      rule_id = result.get("ruleId", "codeql")

                      file_name = ""
                      line = None
                      column = None
                      locations = result.get("locations") or []
                      if locations:
                          physical_location = locations[0].get("physicalLocation", {})
                          file_name = physical_location.get("artifactLocation", {}).get("uri", "")
                          region = physical_location.get("region", {})
                          line = region.get("startLine")
                          column = region.get("startColumn")

                      findings.append(
                          {
                              "level": level,
                              "rule_id": rule_id,
                              "message": message.replace("\n", " "),
                              "file_name": file_name,
                              "line": line,
                              "column": column,
                          }
                      )

          if not findings:
              print("No CodeQL findings on this non-default branch push.")
              sys.exit(0)

          annotation_levels = {
              "error": "error",
              "warning": "warning",
              "note": "notice",
              "recommendation": "notice",
          }

          for finding in findings:
              annotation_level = annotation_levels.get(finding["level"], "warning")
              if annotation_level == "error":
                  failing_findings.append(finding)

              metadata = []
              if finding["rule_id"]:
                  metadata.append(finding["rule_id"])
              if finding["level"]:
                  metadata.append(finding["level"])

              title = " / ".join(metadata)
              message = finding["message"]
              if title:
                  message = f"[CodeQL {title}] {message}"
              else:
                  message = f"[CodeQL] {message}"

              params = []
              if finding["file_name"]:
                  params.append(f"file={finding['file_name']}")
              if finding["line"]:
                  params.append(f"line={finding['line']}")
              if finding["column"]:
                  params.append(f"col={finding['column']}")

              prefix = f"::{annotation_level}"
              if params:
                  prefix += " " + ",".join(params)
              prefix += "::"
              print(prefix + message)

          if not failing_findings:
              print(
                  f"Found {len(findings)} CodeQL finding(s), but none at error level.",
                  file=sys.stderr,
              )
              sys.exit(0)

          print(
                f"Found {len(failing_findings)} error-level CodeQL finding(s) out of {len(findings)} total finding(s) on this non-default branch push.",
              file=sys.stderr,
          )
          sys.exit(1)

  # Have a single final job that we can reference in branch rulesets
  codeql-finalize:
    name: Finalize CodeQL analysis
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - run: 'true'
